# Main Nginx configuration for asanchezbl.dev
# Complete config including SSL — Certbot should NOT modify this file

# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=cv_downloads:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

# HTTP: redirect all to HTTPS (non-www)
server {
    listen 80;
    listen [::]:80;
    server_name asanchezbl.dev www.asanchezbl.dev;

    # Allow certbot to renew via webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/landing;
    }

    location / {
        return 301 https://asanchezbl.dev$request_uri;
    }
}

# HTTPS: redirect www to non-www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.asanchezbl.dev;

    ssl_certificate /etc/letsencrypt/live/asanchezbl.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asanchezbl.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://asanchezbl.dev$request_uri;
}

# HTTPS: main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name asanchezbl.dev;

    ssl_certificate /etc/letsencrypt/live/asanchezbl.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asanchezbl.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Landing page
    location / {
        root /var/www/landing;
        index index.html;
        try_files $uri $uri/ =404;
        expires -1;
    }

    # Static assets (photos, certificates, images)
    location /assets/ {
        alias /var/www/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # CV service - redirect /cv to /cv/
    location = /cv {
        return 301 /cv/;
    }

    # CV downloads — rate limited (5/min per IP, burst 2)
    location /cv/download/ {
        limit_req zone=cv_downloads burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8923/cv/download/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CV service - proxy to FastAPI on port 8001
    location /cv/ {
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8923/cv/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portfolio
    location /portfolio {
        alias /var/www/portfolio;
        index index.html;
        try_files $uri $uri/ /portfolio/index.html;
        expires -1;
    }

    # SERP demo
    location /demo/serp/ {
        proxy_pass http://127.0.0.1:8923/demo/serp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/serp/api/ {
        proxy_pass http://127.0.0.1:8923/demo/serp/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CatLink demo
    location /demo/catlink/ {
        proxy_pass http://127.0.0.1:8923/demo/catlink/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/catlink/api/ {
        proxy_pass http://127.0.0.1:8923/demo/catlink/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/catlink/ws {
        proxy_pass http://127.0.0.1:8923/demo/catlink/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Anubis static assets (challenge page CSS/JS/images)
    location /.within.website/ {
        proxy_pass http://127.0.0.1:8923/.within.website/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # robots.txt and sitemap.xml served from landing dir
    location = /robots.txt {
        root /var/www/landing;
        access_log off;
    }

    location = /sitemap.xml {
        root /var/www/landing;
        access_log off;
    }

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; frame-src 'self'; connect-src 'self' wss://asanchezbl.dev https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
}

# Internal "Clean" Traffic Handler
server {
    listen 127.0.0.1:8080;
    server_name asanchezbl.dev;

    # Final destination for CV
    location /cv/ {
        proxy_pass http://127.0.0.1:8001/;
    }

    # Final destination for SERP
    location /demo/serp/ {
        proxy_pass http://127.0.0.1:3001/;
        sub_filter '</body>' '<div id="demo-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#12121a;border-bottom:2px solid #6366f1;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-family:Inter,sans-serif;font-size:13px;color:#e4e4e7"><div style="display:flex;align-items:center;gap:10px"><span style="background:#22c55e;color:#fff;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px">LIVE DEMO</span><span style="font-weight:500">SERP - Emergency Response System</span><span style="color:#8b8b9e;font-size:11px">Docker container on AWS EC2</span></div><div style="display:flex;gap:12px;align-items:center"><a href="/portfolio#projects" style="color:#6366f1;text-decoration:none;font-size:12px">&larr; Back to Portfolio</a><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#8b8b9e;cursor:pointer;font-size:16px">&times;</button></div></div></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }

    # Final destination for CatLink
    location /demo/catlink/ {
        proxy_pass http://127.0.0.1:3002/;
        sub_filter '</body>' '<div id="demo-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#12121a;border-bottom:2px solid #6366f1;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-family:Inter,sans-serif;font-size:13px;color:#e4e4e7"><div style="display:flex;align-items:center;gap:10px"><span style="background:#22c55e;color:#fff;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px">LIVE DEMO</span><span style="font-weight:500">CatLink - AI EV Charger Agent</span><span style="color:#8b8b9e;font-size:11px">Docker container on AWS EC2</span></div><div style="display:flex;gap:12px;align-items:center"><a href="/portfolio#projects" style="color:#6366f1;text-decoration:none;font-size:12px">&larr; Back to Portfolio</a><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#8b8b9e;cursor:pointer;font-size:16px">&times;</button></div></div></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }

    # Final destination for SERP API
    location /demo/serp/api/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Final destination for CatLink API
    location /demo/catlink/api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Final destination for CatLink WebSocket
    location /demo/catlink/ws {
        proxy_pass http://127.0.0.1:8002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
