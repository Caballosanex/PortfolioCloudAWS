# Main Nginx configuration for asanchezbl.dev
# SSL will be added by Certbot automatically

server {
    listen 80;
    listen [::]:80;
    server_name asanchezbl.dev www.asanchezbl.dev;

    # Landing page
    location / {
        root /var/www/landing;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Static assets (photos, certificates, images)
    location /assets/ {
        alias /var/www/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # CV service - redirect /cv to /cv/
    location = /cv {
        return 301 /cv/;
    }

    # CV service - proxy to FastAPI on port 8001
    location /cv/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portfolio
    location /portfolio {
        alias /var/www/portfolio;
        index index.html;
        try_files $uri $uri/ /portfolio/index.html;
    }

    # SERP demo
    location /demo/serp/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/serp/api/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CatLink demo
    location /demo/catlink/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/catlink/api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/catlink/ws {
        proxy_pass http://127.0.0.1:8002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
