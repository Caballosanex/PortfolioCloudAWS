# Global Nginx configuration for asanchezbl.dev
# Tuned for AWS EC2 t4g.small (2 vCPU ARM64 Graviton, 2GB RAM)
# Deployed by Ansible nginx role to /etc/nginx/nginx.conf

user www-data;
worker_processes auto;
pid /run/nginx.pid;
worker_rlimit_nofile 8192;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # --- MIME types ---
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    keepalive_timeout 65s;
    keepalive_requests 100;

    # --- Gzip compression (INFRA-01) ---
    # Level 5: 95% of compression benefit at 15% less CPU vs level 6 on ARM64
    # gzip_min_length 256: skip tiny responses where compression overhead > savings
    # gzip_proxied any: compress proxied responses (Anubis, backends)
    # NOTE: application/pdf intentionally excluded (already binary-compressed)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- TLS session cache (INFRA-02) ---
    # Shared 10MB cache holds ~40,000 sessions across all workers
    # Repeat visitors skip full TLS handshake (~200-400ms savings)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HTTP/2: enabled per-server in sites-enabled configs via "http2 on;" directive

    # --- Site configs ---
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
