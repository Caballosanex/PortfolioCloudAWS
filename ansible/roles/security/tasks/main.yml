---
# --- SSH Hardening ---
- name: Set SSH port
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port '
    line: "Port {{ ssh_port }}"
  notify: restart sshd

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication '
    line: "PasswordAuthentication no"
  notify: restart sshd

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin '
    line: "PermitRootLogin no"
  notify: restart sshd

# --- Firewall (UFW) ---
- name: Install UFW and fail2ban
  apt:
    name:
      - ufw
      - fail2ban
    state: present

- name: Set UFW default deny incoming
  ufw:
    direction: incoming
    policy: deny

- name: Set UFW default allow outgoing
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH on custom port
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled

# --- fail2ban ---
- name: Configure fail2ban for SSH and Nginx
  copy:
    content: |
      [sshd]
      enabled = true
      port = {{ ssh_port }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 3600
      findtime = 600

      [nginx-http-auth]
      enabled = true
      port = http,https
      filter = nginx-http-auth
      logpath = /var/log/nginx/error.log
      maxretry = 5
      bantime = 3600
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban
