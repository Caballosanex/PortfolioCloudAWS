---
# Main playbook - full server setup in one run
# Usage: cd ansible && ansible-playbook playbooks/site.yml
- name: Base system setup
  hosts: portfolio
  become: true
  roles:
    - role: base
      tags: base
    - role: swap
      tags: swap
    - role: security
      tags: security
    - role: docker
      tags: docker
    - role: nginx
      tags: nginx
    - role: certbot
      tags: certbot

- name: Deploy applications
  hosts: portfolio
  become: true
  roles:
    - role: deploy-landing
      tags: deploy-landing
    - role: deploy-cv
      tags: deploy-cv
    - role: deploy-portfolio
      tags: deploy-portfolio
    - role: deploy-serp
      tags: deploy-serp
    - role: deploy-catlink
      tags: deploy-catlink
    - role: demo-reset
      tags: demo-reset
    - role: anubis
      tags: anubis
