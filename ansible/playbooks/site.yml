---
# Main playbook - full server setup in one run
# Usage: cd ansible && ansible-playbook playbooks/site.yml
- name: Base system setup
  hosts: portfolio
  become: true
  roles:
    - base
    - security
    - docker
    - nginx
    - certbot

- name: Deploy applications
  hosts: portfolio
  become: true
  roles:
    - deploy-landing
    - deploy-cv
    - deploy-portfolio
    - deploy-serp
    - deploy-catlink
    - demo-reset
    - anubis
