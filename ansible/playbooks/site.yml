---
# Main playbook - full server setup in one run
# Usage: cd ansible && ansible-playbook playbooks/site.yml
- name: Base system setup
  hosts: portfolio
  become: true
  roles:
    - base
    - security
    - docker
    - nginx
    - certbot

- name: Deploy applications
  hosts: portfolio
  become: true
  roles:
    - role: deploy-landing
      tags: deploy-landing
    - role: deploy-cv
      tags: deploy-cv
    - role: deploy-portfolio
      tags: deploy-portfolio
    - role: deploy-serp
      tags: deploy-serp
    - role: deploy-catlink
      tags: deploy-catlink
    - role: demo-reset
      tags: demo-reset
    - role: anubis
      tags: anubis
